<header
  id="siteHeader"
  class="page-header position-relative overflow-hidden mb-4"
  data-page=""
>
  <div class="page-header__bg position-absolute top-0 start-0 w-100 h-100"></div>
  <div class="page-header__overlay position-absolute top-0 start-0 w-100 h-100"></div>

  <div class="container position-relative py-4 py-md-5">
    <div class="page-header__row d-flex align-items-center justify-content-between">

      <!-- LEFT: Seal + Title box-->
      <div class="page-header__left d-flex align-items-center">
        <div class="page-header__seal rounded-circle overflow-hidden flex-shrink-0">
          <img id="headerSeal" src="" alt="" class="w-100 h-100 object-fit-cover">
        </div>

        <div class="page-header__titlebox px-4 px-md-5 py-3 py-md-4 rounded-4 shadow-sm">
          <div id="headerKicker" class="text-uppercase small opacity-75 mb-1"></div>
          <h1 id="headerTitle" class="mb-0"></h1>
        </div>
      </div>

      <!-- RIGHT: reserved space for navbar (leave empty for now) -->
      <div class="page-header__right" id="headerNavMount"></div>

    </div>
  </div>
</header>
